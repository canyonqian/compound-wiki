name: CAM CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Test module imports
        run: |
          python -c "import cam; print('cam OK')"
          python -c "import cam_core; print('cam_core OK')"
          python -c "import cam_core.shared_wiki; print('shared_wiki OK')"
          python -c "import cam_core.deduplicator; print('deduplicator OK')"
          python -c "import cam_core.memory_graph; print('memory_graph OK')"
          python -c "import cam_daemon; print('cam_daemon OK')"
          python -c "import cam_daemon.server; print('server OK')"

      - name: Test CLI
        run: |
          python -m cam.cli --help || true
          python -m cam.cli daemon --help || true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check . --ignore E501
      - run: ruff format --check .
