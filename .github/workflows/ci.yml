name: CAM CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[all]"

      - name: Test: module imports
        run: |
          python -c "
          modules = [
              'cam',
              'cam_core',
              'cam_core.shared_wiki',
              'cam_core.extractor',
              'cam_core.deduplicator',
              'cam_core.memory_graph',
              'cam_daemon',
              'cam_daemon.server',
              'cam_daemon.config',
              'cam_daemon.client',
          ]
          ok = fail = 0
          for m in modules:
              try:
                  __import__(m)
                  print(f'[PASS] {m}')
                  ok += 1
              except Exception as e:
                  print(f'[FAIL] {m}: {e}')
                  fail += 1
          print(f'{ok}/{len(modules)} modules OK, {fail} failed')
          if fail > 0:
              raise SystemExit(1)
          "

      - name: Test: cam --help
        run: python -m cam.cli --help

      - name: Test: cam daemon --help
        run: python -m cam.cli daemon --help

      - name: Test: cam init + lint
        run: |
          python -m cam.cli init /tmp/cam-e2e
          python -m cam.cli lint /tmp/cam-e2e

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - name: Ruff check
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
