<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=320">
<title>Compound Wiki</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    width: 320px;
    min-height: 400px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0f172a;
    color: #e2e8f0;
    overflow-x: hidden;
  }
  
  /* Header */
  .header {
    background: linear-gradient(135deg, #1e293b, #334155);
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .header-icon { font-size: 22px; }
  .header h1 {
    flex: 1;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .header-badge {
    font-size: 9px;
    background: #22c55e;
    color: white;
    padding: 2px 7px;
    border-radius: 99px;
    font-weight: 700;
  }

  /* Connection Status */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 18px;
    font-size: 11px;
    background: rgba(15,23,42,0.5);
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    margin-right: 6px;
    display: inline-block;
  }
  .status-dot.connected { background: #22c55e; box-shadow: 0 0 6px #22c55e66; }
  .status-dot.disconnected { background: #ef4444; box-shadow: 0 0 6px #ef444466; }
  .status-dot.unknown { background: #f59e0b; }
  
  .today-count {
    background: #1e293b;
    padding: 2px 10px;
    border-radius: 99px;
    font-weight: 600;
  }

  /* Current Page Card */
  .page-card {
    margin: 14px 12px;
    background: #1e293b;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .page-card-header {
    padding: 12px 14px 8px;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .page-title {
    padding: 0 14px 10px;
    font-size: 13px;
    line-height: 1.4;
    color: #f1f5f9;
    font-weight: 500;
    max-height: 44px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  /* Score Display */
  .score-section {
    padding: 0 14px 12px;
  }
  .score-main {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .score-ring {
    position: relative;
    width: 52px; height: 52px;
    flex-shrink: 0;
  }
  .score-ring svg {
    transform: rotate(-90deg);
  }
  .score-ring .bg {
    stroke: #334155;
    fill: none;
    stroke-width: 4;
  }
  .score-ring .fg {
    fill: none;
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 0.5s ease, stroke 0.3s ease;
  }
  .score-value {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
  }
  .score-details {
    flex: 1;
  }
  .score-decision {
    font-size: 11px;
    font-weight: 600;
    margin-bottom: 4px;
  }
  .score-decision.capture { color: #22c55e; }
  .score-decision.observe { color: #f59e0b; }
  .score-decision.ignore { color: #64748b; }
  
  .dimension-bars {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 3px 10px;
    margin-top: 8px;
  }
  .dim-bar {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 9px;
    color: #94a3b8;
  }
  .dim-bar .track {
    flex: 1;
    height: 3px;
    background: #334155;
    border-radius: 2px;
    overflow: hidden;
  }
  .dim-bar .fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.3s ease;
  }

  /* Behavior Stats */
  .behavior-stats {
    display: flex;
    gap: 8px;
    padding: 10px 14px 14px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .stat-item {
    flex: 1;
    text-align: center;
    background: #0f172a;
    border-radius: 8px;
    padding: 8px 4px;
  }
  .stat-value {
    font-size: 16px;
    font-weight: 800;
    color: #f1f5f9;
  }
  .stat-label {
    font-size: 8px;
    color: #64748b;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-top: 2px;
  }

  /* Action Buttons */
  .actions {
    padding: 0 12px 12px;
    display: flex;
    gap: 8px;
  }
  .btn {
    flex: 1;
    padding: 10px 12px;
    border: none;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .btn-primary {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: white;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px #2563eb44; }
  .btn-secondary {
    background: #334155;
    color: #e2e8f0;
  }
  .btn-secondary:hover { background: #475569; }
  .btn-danger {
    background: #334155;
    color: #f87171;
  }
  .btn-danger:hover { background: #451a1a; }
  .btn-sm {
    padding: 7px 10px;
    font-size: 11px;
  }

  /* Toggle */
  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 18px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .toggle-label {
    font-size: 12px;
    color: #cbd5e1;
  }
  .toggle-switch {
    position: relative;
    width: 40px; height: 22px;
    appearance: none;
    background: #475569;
    border-radius: 11px;
    cursor: pointer;
    transition: background 0.2s ease;
  }
  .toggle-switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 18px; height: 18px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s ease;
  }
  .toggle-switch:checked {
    background: #22c55e;
  }
  .toggle-switch:checked::after {
    transform: translateX(18px);
  }

  /* Recent Captures */
  .recent-section {
    padding: 12px 18px 8px;
  }
  .section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .recent-list {
    list-style: none;
  }
  .recent-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.03);
    font-size: 11px;
  }
  .recent-item:last-child { border-bottom: none; }
  .recent-score {
    font-size: 9px;
    font-weight: 700;
    padding: 2px 6px;
    border-radius: 99px;
    flex-shrink: 0;
  }
  .recent-score.high { background: #16653433; color: #4ade80; }
  .recent-score.mid { background: #854d0e33; color: #facc15; }
  .recent-title {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: #94a3b8;
  }
  .recent-time {
    font-size: 9px;
    color: #475569;
    flex-shrink: 0;
  }

  /* Empty State */
  .empty-state {
    text-align: center;
    padding: 24px 18px;
    color: #475569;
  }
  .empty-state .icon { font-size: 32px; margin-bottom: 8px; }
  .empty-state p { font-size: 12px; line-height: 1.5; }

  /* Footer */
  .footer {
    text-align: center;
    padding: 12px;
    font-size: 9px;
    color: #334155;
    border-top: 1px solid rgba(255,255,255,0.03);
  }
  .footer a { color: #64748b; text-decoration: none; }
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <span class="header-icon">🧠</span>
  <h1>Compound Wiki</h1>
  <span class="header-badge">SMART</span>
</div>

<!-- Status Bar -->
<div class="status-bar">
  <div id="connectionStatus">
    <span class="status-dot unknown" id="statusDot"></span>
    <span id="statusText">Checking...</span>
  </div>
  <div class="today-count" id="todayCount">0 today</div>
</div>

<!-- Current Page Analysis -->
<div class="page-card" id="pageCard">
  <div class="page-card-header">
    📊 Current Page
  </div>
  <div class="page-title" id="pageTitle">Loading...</div>
  
  <div class="score-section">
    <div class="score-main">
      <div class="score-ring">
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle class="bg" cx="26" cy="26" r="22"/>
          <circle class="fg" id="scoreFg" cx="26" cy="26" r="22"
                  stroke="#64748b"
                  stroke-dasharray="138.23"
                  stroke-dashoffset="138.23"/>
        </svg>
        <div class="score-value" id="scoreValue">--</div>
      </div>
      <div class="score-details">
        <div class="score-decision observe" id="scoreDecision">Analyzing...</div>
        <div style="font-size:10px;color:#64748b" id="scoreHint"></div>
        
        <div class="dimension-bars" id="dimBars">
          <!-- Populated by JS -->
        </div>
      </div>
    </div>
    
    <div class="behavior-stats" id="behaviorStats">
      <div class="stat-item">
        <div class="stat-value" id="statScroll">0%</div>
        <div class="stat-label">Scroll</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statDwell">0s</div>
        <div class="stat-label">Reading</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="statHighlights">0</div>
        <div class="stat-label">Highlights</div>
      </div>
    </div>
  </div>
</div>

<!-- Action Buttons -->
<div class="actions">
  <button class="btn btn-primary" id="btnForceCapture">
    💾 Force Save Now
  </button>
  <button class="btn btn-secondary btn-sm" id="btnSettings">
    ⚙️
  </button>
</div>

<!-- Auto-Capture Toggle -->
<div class="toggle-row">
  <span class="toggle-label">🤖 Auto-Capture</span>
  <input type="checkbox" class="toggle-switch" id="autoCaptureToggle" checked>
</div>

<!-- Recent Captures -->
<div class="recent-section">
  <div class="section-label">🕐 Recently Saved</div>
  <ul class="recent-list" id="recentList">
    <li class="empty-state" style="list-style:none;padding:12px 0;">
      <p>No captures yet today.<br>Browse some articles!</p>
    </li>
  </ul>
</div>

<!-- Footer -->
<div class="footer">
  CAM v<span id="versionNum">1.2.0</span> · 
  <a href="#" id="openSettings">Settings</a>
</div>

<script src="popup.js"></script>
</body>
</html>
